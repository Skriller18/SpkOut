<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>SpkOut - Voice to Text</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        .header {
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #00e5ff;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        
        .session-bar {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        
        .session-bar input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
            min-width: 0;
            -webkit-appearance: none;
        }
        
        .session-bar button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: #00e5ff;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            -webkit-appearance: none;
        }
        
        .session-bar button:active {
            transform: scale(0.95);
        }
        
        .share-link {
            padding: 8px 12px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .share-link input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #00e5ff;
            font-size: 12px;
            min-width: 0;
            -webkit-appearance: none;
        }
        
        .share-link button {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #222;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            padding-bottom: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Chat styles */
        .transcripts {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .chat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            word-break: break-word;
        }
        
        .audio-item {
            align-items: flex-start;
        }
        
        .audio-bubble {
            background: #1a4d1a;
            border-radius: 18px 18px 18px 4px;
        }
        
        .audio-bubble audio {
            max-width: 250px;
            height: 40px;
        }
        
        .text-item {
            align-items: flex-start;
        }
        
        .text-bubble {
            background: #1a1a2e;
            color: #fff;
            font-size: 15px;
            line-height: 1.5;
            border-radius: 18px 18px 18px 4px;
            border-left: 3px solid #00e5ff;
        }
        
        .chat-time {
            font-size: 11px;
            color: #666;
            padding-left: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        
        .bottom-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent 0%, #0a0a0a 30%, #0a0a0a 100%);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 50;
        }
        
        .toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        
        .toolbar-btn {
            padding: 8px 14px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            -webkit-appearance: none;
        }
        
        .toolbar-btn:active {
            transform: scale(0.95);
            background: #252525;
        }
        
        .record-bar {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        .record-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: #ff3b30;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(255, 59, 48, 0.4);
            transition: transform 0.15s ease, background 0.2s;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        
        .record-btn:active {
            transform: scale(0.92);
        }
        
        .record-btn.recording {
            background: #ff9500;
            animation: pulse 1.2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            display: none;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            min-width: 180px;
        }
        
        .status.active {
            display: block;
        }
        
        .status .recording-text {
            color: #ff3b30;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 200;
            animation: fadeIn 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 16px; }
            .chat-bubble { max-width: 90%; padding: 10px 14px; }
            .text-bubble { font-size: 14px; }
            .record-btn { width: 60px; height: 60px; font-size: 22px; }
        }

        @media (min-width: 768px) {
            .main { max-width: 600px; margin: 0 auto; width: 100%; }
            .bottom-area { max-width: 600px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎙️ SpkOut</h1>
        <p>Record voice, get transcript</p>
    </div>
    
    <div class="session-bar">
        <input type="text" id="sessionInput" placeholder="Enter session ID or leave empty for new" maxlength="50" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button onclick="joinSession()">Join</button>
    </div>
    
    <div class="share-link" id="shareSection" style="display:none;">
        <span>🔗</span>
        <input type="text" id="shareUrl" readonly>
        <button onclick="copyLink()">Copy</button>
    </div>
    
    <div class="main">
        <div class="transcripts" id="transcripts">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
                </svg>
                <p>Join a session and record a voice note</p>
            </div>
        </div>
    </div>
    
    <div class="bottom-area">
        <div class="record-bar">
            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
        </div>
        <div class="toolbar">
            <button class="toolbar-btn" onclick="copyAllText()">📋 Copy</button>
            <button class="toolbar-btn" onclick="downloadText()">⬇️ Save</button>
            <button class="toolbar-btn" onclick="clearTranscripts()">🗑️ Clear</button>
        </div>
    </div>
    
    <div class="status" id="status">
        <div class="recording-text">🔴 Recording...</div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script src="app.js"></script>
</body>
</html>
